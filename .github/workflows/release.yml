name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-release:
    name: Build macOS release
    runs-on: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app/Contents/Developer

      - name: Test
        run: swift test

      - name: Build DMG
        run: ./scripts/make-release-dmg.sh

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          gh release create "$TAG_NAME" \
            ".build/dist/MarkdownStudio.dmg" \
            --title "MarkdownStudio $TAG_NAME" \
            --notes "Download MarkdownStudio.dmg, open it, and drag MarkdownStudio.app to Applications."
